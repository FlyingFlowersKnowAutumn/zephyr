server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
      config:
        enabled: false
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: interaction-service
          uri: lb://interaction-service
          predicates:
            - Path=/api/v1/comments/**,/api/v1/guestbook/**,/api/v1/articles/*/reaction,/api/v1/articles/*/favorite,/api/v1/reactions/**,/api/v1/favorites/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/about/**,/api/v1/site/**,/uploads/**,/api/v1/upload/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
        - id: article-service
          uri: lb://article-service
          predicates:
            - Path=/api/v1/articles/**,/api/v1/categories/**,/api/v1/tags/**,/api/v1/sitemap.xml,/api/v1/rss.xml
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
      default-filters:
        - name: Retry
          args:
            retries: 3
            methods: GET
            statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

jwt:
  secret: blog-secret-key-for-dev-only-change-in-production-1234567890
  expiration: 900000

management:
  endpoints:
    web:
      exposure:
        include: health,info