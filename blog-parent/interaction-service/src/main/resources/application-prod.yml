server:
  port: 8003

spring:
  application:
    name: interaction-service
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: nacos:8848
  datasource:
    url: jdbc:postgresql://postgres:5432/interaction_db?stringtype=unspecified
    username: postgres
    password: #数据库密码
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

article:
  service:
    url: http://article-service:8082/api/v1/articles

logging:
  level:
    com.example.blog.interaction: INFO
