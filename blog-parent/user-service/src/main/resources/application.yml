server:
  port: 8002

spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
      config:
        enabled: false
        import-check:
          enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: postgres
    password: #数据库密码
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: smtp.qq.com
    port: 587
    username: #qq邮箱
    password: #邮箱授权码
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          required: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

file:
  upload:
    path: uploads
    base-url: /uploads

jwt:
  secret: blog-secret-key-for-dev-only-change-in-production-1234567890
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.example.blog.user: DEBUG