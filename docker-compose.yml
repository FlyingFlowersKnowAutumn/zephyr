services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:14.23
    container_name: blog-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: #数据库密码
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  redis:
    image: docker.m.daocloud.io/library/redis:7.2-alpine
    container_name: blog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - blog-network

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: blog-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 512m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - blog-network

  api-gateway:
    build: ./blog-parent/api-gateway
    container_name: blog-gateway
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - blog-network

  article-service:
    build: ./blog-parent/article-service
    container_name: blog-article
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/article_db?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: #数据库密码
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - blog-network

  user-service:
    build: ./blog-parent/user-service
    container_name: blog-user
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: #数据库密码
      SPRING_DATA_REDIS_HOST: redis
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - blog-network

  interaction-service:
    build: ./blog-parent/interaction-service
    container_name: blog-interaction
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interaction_db?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: #数据库密码
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - blog-network

  nginx:
    build: ./blog-frontend
    image: blog-frontend:1.0
    container_name: blog-nginx
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - api-gateway
    networks:
      - blog-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://host.docker.internal:80
    restart: always


networks:
  blog-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nacos_data:
  nacos_logs:
  uploads_data:
